name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Dummy values for build — real values set in Vercel
      MIDTRANS_SERVER_KEY: dummy-server-key
      NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: dummy-client-key
      NEXT_PUBLIC_MIDTRANS_IS_PRODUCTION: "false"
      NEXT_PUBLIC_PHOTO_PRICE: "15000"
      NEXT_PUBLIC_PRINT_PRICE: "5000"
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dummy-cloud
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: dummy-preset
      VOUCHER_CODES: "CASH001"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
